<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>荣的天气台</title>
    <link rel="stylesheet" href="styles.css">
  </head>
  <body>
    <main class="shell">
      <section class="hero" aria-labelledby="app-title">
        <div class="sky" aria-hidden="true">
          <span class="sun"></span>
          <span class="cloud cloud-one"></span>
          <span class="cloud cloud-two"></span>
          <span class="rain rain-one"></span>
          <span class="rain rain-two"></span>
        </div>
        <div class="seal" aria-hidden="true">荣</div>
        <div class="hero-copy">
          <p class="eyebrow">Rong Weather Archive</p>
          <h1 id="app-title">荣的天气台</h1>
          <p id="weekly-note">正在读取荣公开发布的内心天气。</p>
        </div>
      </section>

      <section class="panel visitor-panel" id="visitor-panel">
        <p class="eyebrow">公开只读</p>
        <h2>这里展示荣已经发布的天气记录</h2>
        <p>访客只能查看，不能修改。荣可以用地址后加 <strong>?admin=1</strong> 进入管理发布模式。</p>
      </section>

      <section class="dashboard" aria-label="荣的天气台">
        <form class="panel entry-panel admin-only" id="entry-form">
          <div class="panel-head">
            <div>
              <p class="eyebrow">管理发布</p>
              <h2>记录荣的一场天气</h2>
            </div>
            <time id="today-label"></time>
          </div>

          <label>
            <span>一句短句</span>
            <textarea id="note" rows="4" maxlength="120" placeholder="例如：今天有一点雾，但路灯很亮。"></textarea>
          </label>

          <div class="field-grid">
            <label>
              <span>心情颜色</span>
              <input id="mood-color" type="color" value="#4f8fce">
            </label>

            <label>
              <span>精力值</span>
              <input id="energy" type="range" min="1" max="10" value="6">
              <strong id="energy-value">6</strong>
            </label>
          </div>

          <fieldset>
            <legend>内心天气</legend>
            <div class="weather-options" id="weather-options"></div>
          </fieldset>

          <fieldset>
            <legend>事件标签</legend>
            <div class="tag-options" id="tag-options"></div>
          </fieldset>

          <label>
            <span>发布密码</span>
            <input id="publish-password" type="password" autocomplete="current-password" placeholder="只在发布时使用">
          </label>

          <p class="status" id="save-status" role="status" aria-live="polite"></p>

          <div class="actions">
            <button class="primary" type="submit">发布今日天气</button>
            <button class="ghost" type="button" id="clear-today">清空本地草稿</button>
          </div>
        </form>

        <aside class="panel station-panel">
          <div class="current-card" id="current-card">
            <p class="eyebrow">当前状态</p>
            <div class="weather-mark" id="weather-mark">晴</div>
            <h2 id="current-title">还没有公开记录</h2>
            <p id="current-copy">荣发布天气后，这里会显示最新状态。</p>
          </div>

          <div class="share-card" id="share-card">
            <p class="eyebrow">分享卡片</p>
            <h2>荣今天的内心天气</h2>
            <p id="share-text">还没有今日公开记录。</p>
            <button class="primary" type="button" id="copy-share">复制分享文案</button>
          </div>

          <div class="stats">
            <div>
              <span>平均精力</span>
              <strong id="avg-energy">--</strong>
            </div>
            <div>
              <span>公开天数</span>
              <strong id="total-days">0</strong>
            </div>
            <div>
              <span>常见天气</span>
              <strong id="common-weather">--</strong>
            </div>
          </div>
        </aside>
      </section>

      <section class="timeline" aria-labelledby="week-title">
        <div class="section-head">
          <div>
            <p class="eyebrow">最近七天</p>
            <h2 id="week-title">荣的天气图</h2>
          </div>
          <div class="toolbar admin-only">
            <button class="ghost" type="button" id="export-data">导出本地备份</button>
            <label class="import-button">
              导入本地备份
              <input id="import-data" type="file" accept="application/json">
            </label>
          </div>
        </div>
        <div class="week-grid" id="week-grid"></div>
      </section>

      <section class="history" aria-labelledby="history-title">
        <div class="section-head">
          <div>
            <p class="eyebrow">档案</p>
            <h2 id="history-title">荣的公开气象档案</h2>
          </div>
        </div>
        <div class="history-list" id="history-list"></div>
      </section>
    </main>

    <script src="app.js"></script>
  </body>
</html>
