<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>荣的天气台</title>
    <style>
:root {
  color-scheme: light;
  --ink: #172026;
  --muted: #66737f;
  --paper: #f7f4ed;
  --panel: #fffdf8;
  --line: #ded8cd;
  --teal: #276b70;
  --green: #718a4f;
  --rose: #b56a68;
  --gold: #c28b34;
  --shadow: 0 18px 45px rgba(43, 38, 30, 0.14);
}

* {
  box-sizing: border-box;
}

body {
  margin: 0;
  min-height: 100vh;
  background:
    linear-gradient(135deg, rgba(39, 107, 112, 0.16), transparent 32%),
    linear-gradient(225deg, rgba(181, 106, 104, 0.15), transparent 30%),
    var(--paper);
  color: var(--ink);
  font-family: "Microsoft YaHei", "PingFang SC", "Segoe UI", sans-serif;
}

button,
input,
textarea {
  font: inherit;
}

.shell {
  width: min(1180px, calc(100% - 32px));
  margin: 0 auto;
  padding: 24px 0 48px;
}

.hero {
  position: relative;
  display: grid;
  min-height: 330px;
  margin-bottom: 18px;
  overflow: hidden;
  border: 1px solid rgba(23, 32, 38, 0.1);
  border-radius: 8px;
  background: linear-gradient(160deg, #dfeee9 0%, #f8ddbd 55%, #f3a998 100%);
  box-shadow: var(--shadow);
}

.hero-copy {
  position: relative;
  z-index: 2;
  align-self: end;
  max-width: 760px;
  padding: 36px;
}

.seal {
  position: absolute;
  right: 34px;
  bottom: 30px;
  z-index: 2;
  display: grid;
  place-items: center;
  width: 86px;
  height: 86px;
  border: 2px solid rgba(181, 106, 104, 0.62);
  border-radius: 8px;
  color: var(--rose);
  font-size: 3rem;
  font-weight: 900;
  transform: rotate(-5deg);
  background: rgba(255, 253, 248, 0.36);
}

.eyebrow {
  margin: 0 0 8px;
  color: var(--teal);
  font-size: 0.78rem;
  font-weight: 700;
  letter-spacing: 0;
  text-transform: uppercase;
}

h1,
h2,
p {
  margin-top: 0;
}

h1 {
  margin-bottom: 12px;
  font-size: clamp(2.7rem, 7vw, 5.8rem);
  line-height: 0.95;
  letter-spacing: 0;
}

h2 {
  margin-bottom: 0;
  font-size: 1.35rem;
  letter-spacing: 0;
}

.hero p:last-child {
  max-width: 620px;
  margin-bottom: 0;
  color: #27343b;
  font-size: 1.1rem;
  line-height: 1.7;
}

.sky {
  position: absolute;
  inset: 0;
}

.sun {
  position: absolute;
  right: 9%;
  top: 16%;
  width: 120px;
  aspect-ratio: 1;
  border-radius: 50%;
  background: #ffe28a;
  box-shadow: 0 0 70px rgba(255, 226, 138, 0.8);
}

.cloud {
  position: absolute;
  width: 220px;
  height: 78px;
  border-radius: 999px;
  background: rgba(255, 253, 248, 0.72);
}

.cloud::before,
.cloud::after {
  position: absolute;
  content: "";
  border-radius: 50%;
  background: inherit;
}

.cloud::before {
  left: 36px;
  top: -42px;
  width: 96px;
  height: 96px;
}

.cloud::after {
  right: 32px;
  top: -30px;
  width: 82px;
  height: 82px;
}

.cloud-one {
  left: 10%;
  top: 22%;
}

.cloud-two {
  right: 18%;
  bottom: 18%;
  transform: scale(0.72);
}

.rain {
  position: absolute;
  width: 3px;
  height: 76px;
  border-radius: 999px;
  background: rgba(39, 107, 112, 0.42);
  transform: rotate(14deg);
}

.rain-one {
  right: 32%;
  top: 42%;
}

.rain-two {
  right: 28%;
  top: 50%;
}

.dashboard {
  display: grid;
  grid-template-columns: minmax(0, 1.35fr) minmax(300px, 0.65fr);
  gap: 18px;
  align-items: start;
}

.panel,
.timeline,
.history {
  border: 1px solid var(--line);
  border-radius: 8px;
  background: rgba(255, 253, 248, 0.9);
  box-shadow: 0 10px 30px rgba(43, 38, 30, 0.08);
}

.panel {
  padding: 22px;
}

.panel-head,
.section-head,
.actions,
.field-grid,
.stats,
.toolbar {
  display: flex;
  gap: 14px;
}

.panel-head,
.section-head,
.actions,
.toolbar {
  align-items: center;
  justify-content: space-between;
}

#today-label {
  color: var(--muted);
  font-weight: 700;
}

label,
fieldset {
  display: grid;
  gap: 8px;
  margin: 18px 0 0;
  border: 0;
  padding: 0;
}

label span,
legend {
  color: #3e4b53;
  font-size: 0.92rem;
  font-weight: 700;
}

textarea {
  width: 100%;
  resize: vertical;
  border: 1px solid var(--line);
  border-radius: 8px;
  padding: 14px;
  background: #fffaf1;
  color: var(--ink);
  outline: none;
}

textarea:focus,
input[type="color"]:focus,
button:focus-visible,
.import-button:focus-within {
  outline: 3px solid rgba(39, 107, 112, 0.24);
  outline-offset: 2px;
}

.field-grid {
  align-items: end;
}

.field-grid label {
  flex: 1;
}

input[type="color"] {
  width: 100%;
  height: 48px;
  border: 1px solid var(--line);
  border-radius: 8px;
  padding: 4px;
  background: #fffaf1;
}

input[type="range"] {
  accent-color: var(--teal);
}

#energy-value {
  color: var(--teal);
}

.weather-options,
.tag-options {
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
}

.chip {
  min-height: 38px;
  border: 1px solid var(--line);
  border-radius: 999px;
  padding: 8px 12px;
  background: #fffaf1;
  color: var(--ink);
  cursor: pointer;
}

.chip[aria-pressed="true"] {
  border-color: var(--teal);
  background: #dfeee9;
  color: #143b3f;
  font-weight: 700;
}

button,
.import-button {
  border: 0;
  border-radius: 8px;
  padding: 11px 15px;
  font-weight: 800;
  cursor: pointer;
}

.primary {
  background: var(--teal);
  color: white;
}

.ghost,
.import-button {
  border: 1px solid var(--line);
  background: #fffaf1;
  color: #33424a;
}

.import-button {
  position: relative;
  display: inline-grid;
  place-items: center;
}

.import-button input {
  position: absolute;
  inset: 0;
  opacity: 0;
  cursor: pointer;
}

.status {
  min-height: 24px;
  margin: 14px 0 0;
  color: var(--teal);
  font-weight: 800;
}

.station-panel {
  position: sticky;
  top: 18px;
}

.current-card,
.share-card {
  border-radius: 8px;
  padding: 22px;
}

.current-card {
  min-height: 260px;
  background: linear-gradient(145deg, rgba(79, 143, 206, 0.2), rgba(255, 250, 241, 0.95));
}

.share-card {
  margin-top: 16px;
  border: 1px solid var(--line);
  background: #fffaf1;
}

.share-card p:last-of-type {
  white-space: pre-line;
  color: #3e4b53;
  line-height: 1.7;
}

.weather-mark {
  display: grid;
  place-items: center;
  width: 92px;
  height: 92px;
  margin: 18px 0;
  border-radius: 50%;
  background: var(--panel);
  color: var(--teal);
  font-size: 1.5rem;
  font-weight: 900;
  box-shadow: inset 0 0 0 1px var(--line);
}

#current-copy {
  color: var(--muted);
  line-height: 1.7;
}

.stats {
  margin-top: 16px;
}

.stats div {
  flex: 1;
  min-width: 0;
  border: 1px solid var(--line);
  border-radius: 8px;
  padding: 12px;
  background: #fffaf1;
}

.stats span {
  display: block;
  color: var(--muted);
  font-size: 0.82rem;
}

.stats strong {
  display: block;
  margin-top: 6px;
  font-size: 1.2rem;
}

.timeline,
.history {
  margin-top: 18px;
  padding: 22px;
}

.week-grid {
  display: grid;
  grid-template-columns: repeat(7, minmax(0, 1fr));
  gap: 10px;
  margin-top: 18px;
}

.day {
  min-height: 150px;
  border: 1px solid var(--line);
  border-radius: 8px;
  padding: 12px;
  background: #fffaf1;
}

.day.has-record {
  color: #132026;
}

.day small {
  display: block;
  color: var(--muted);
  font-weight: 800;
}

.day strong {
  display: block;
  margin: 12px 0 8px;
  font-size: 1rem;
}

.day p {
  margin-bottom: 0;
  color: #3e4b53;
  font-size: 0.88rem;
  line-height: 1.5;
}

.history-list {
  display: grid;
  gap: 10px;
  margin-top: 18px;
}

.record {
  display: grid;
  grid-template-columns: 110px 1fr auto;
  gap: 12px;
  align-items: center;
  border: 1px solid var(--line);
  border-radius: 8px;
  padding: 12px;
  background: #fffaf1;
}

.record time {
  color: var(--muted);
  font-weight: 800;
}

.record p {
  margin: 4px 0 0;
  color: #3e4b53;
}

.empty {
  color: var(--muted);
  line-height: 1.7;
}

@media (max-width: 860px) {
  .dashboard,
  .week-grid {
    grid-template-columns: 1fr;
  }

  .station-panel {
    position: static;
  }

  .record {
    grid-template-columns: 1fr;
  }
}

@media (max-width: 560px) {
  .shell {
    width: min(100% - 20px, 1180px);
    padding-top: 10px;
  }

  .hero {
    min-height: 300px;
  }

  .hero-copy,
  .panel,
  .timeline,
  .history {
    padding: 16px;
  }

  .seal {
    right: 18px;
    bottom: 18px;
    width: 64px;
    height: 64px;
    font-size: 2.2rem;
  }

  .field-grid,
  .stats,
  .actions,
  .section-head,
  .toolbar {
    align-items: stretch;
    flex-direction: column;
  }
}

    </style>
  </head>
  <body>
    <main class="shell">
      <section class="hero" aria-labelledby="app-title">
        <div class="sky" aria-hidden="true">
          <span class="sun"></span>
          <span class="cloud cloud-one"></span>
          <span class="cloud cloud-two"></span>
          <span class="rain rain-one"></span>
          <span class="rain rain-two"></span>
        </div>
        <div class="seal" aria-hidden="true">荣</div>
        <div class="hero-copy">
          <p class="eyebrow">Rong Weather Archive</p>
          <h1 id="app-title">荣的天气台</h1>
          <p id="weekly-note">荣，今天的内心天气还没有入档。</p>
        </div>
      </section>

      <section class="dashboard" aria-label="荣的天气台">
        <form class="panel entry-panel" id="entry-form">
          <div class="panel-head">
            <div>
              <p class="eyebrow">今日播报</p>
              <h2>记录荣的一场天气</h2>
            </div>
            <time id="today-label"></time>
          </div>

          <label>
            <span>一句短句</span>
            <textarea id="note" rows="4" maxlength="120" placeholder="例如：今天有一点雾，但路灯很亮。"></textarea>
          </label>

          <div class="field-grid">
            <label>
              <span>心情颜色</span>
              <input id="mood-color" type="color" value="#4f8fce">
            </label>

            <label>
              <span>精力值</span>
              <input id="energy" type="range" min="1" max="10" value="6">
              <strong id="energy-value">6</strong>
            </label>
          </div>

          <fieldset>
            <legend>内心天气</legend>
            <div class="weather-options" id="weather-options"></div>
          </fieldset>

          <fieldset>
            <legend>事件标签</legend>
            <div class="tag-options" id="tag-options"></div>
          </fieldset>

          <p class="status" id="save-status" role="status" aria-live="polite"></p>

          <div class="actions">
            <button class="primary" type="submit">保存今日天气</button>
            <button class="ghost" type="button" id="clear-today">清空今日</button>
          </div>
        </form>

        <aside class="panel station-panel">
          <div class="current-card" id="current-card">
            <p class="eyebrow">当前状态</p>
            <div class="weather-mark" id="weather-mark">晴</div>
            <h2 id="current-title">还没有记录</h2>
            <p id="current-copy">荣，选一种天气，给今天留一个小小的坐标。</p>
          </div>

          <div class="share-card" id="share-card">
            <p class="eyebrow">分享卡片</p>
            <h2>荣今天的内心天气</h2>
            <p id="share-text">保存今日天气后，这里会自动生成“今日分享语句”。</p>
            <button class="primary" type="button" id="copy-share">复制分享文案</button>
          </div>

          <div class="stats">
            <div>
              <span>平均精力</span>
              <strong id="avg-energy">--</strong>
            </div>
            <div>
              <span>记录天数</span>
              <strong id="total-days">0</strong>
            </div>
            <div>
              <span>常见天气</span>
              <strong id="common-weather">--</strong>
            </div>
          </div>
        </aside>
      </section>

      <section class="timeline" aria-labelledby="week-title">
        <div class="section-head">
          <div>
            <p class="eyebrow">最近七天</p>
            <h2 id="week-title">荣的天气图</h2>
          </div>
          <div class="toolbar">
            <button class="ghost" type="button" id="export-data">导出备份</button>
            <label class="import-button">
              导入备份
              <input id="import-data" type="file" accept="application/json">
            </label>
          </div>
        </div>
        <div class="week-grid" id="week-grid"></div>
      </section>

      <section class="history" aria-labelledby="history-title">
        <div class="section-head">
          <div>
            <p class="eyebrow">档案</p>
            <h2 id="history-title">荣的气象档案</h2>
          </div>
        </div>
        <div class="history-list" id="history-list"></div>
      </section>
    </main>

    <script>
const STORAGE_KEY = "rong-weather-station-v2";

const weathers = [
  { name: "晴", title: "晴朗", copy: "荣今天有光，适合把好事情记下来。" },
  { name: "云", title: "多云", copy: "有些事被遮住了，但荣的天空仍然有层次。" },
  { name: "雾", title: "起雾", copy: "看不清也没关系，荣只需要确认下一步。" },
  { name: "雨", title: "下雨", copy: "今天湿度偏高，荣可以少消耗一点。" },
  { name: "雷", title: "雷阵雨", copy: "能量很强，先让它安全地经过身体。" },
  { name: "风", title: "有风", copy: "有变化在路上，荣可以松开一点点手。" },
  { name: "雪", title: "下雪", copy: "世界变安静了，荣慢一点也很好。" }
];

const shareLines = {
  晴: [
    "今天有光落在荣这里，适合把值得的事认真收藏。",
    "荣今天的天空比较亮，适合向前走，也适合奖励自己。",
    "晴天不一定代表万事顺利，但代表荣还有清楚的方向。"
  ],
  云: [
    "荣今天的云层有点厚，但它们也在替天空保存柔软。",
    "多云的日子不用急着放晴，荣只需要保持自己的节奏。",
    "有些光被遮住了，但荣的天气仍然有层次。"
  ],
  雾: [
    "雾里的荣不需要看见全部，只需要确认下一步。",
    "今天能见度有限，荣可以慢一点，稳一点。",
    "雾不是迷路，它只是提醒荣把速度降下来。"
  ],
  雨: [
    "荣今天的心里在下雨，适合少消耗，多照顾自己。",
    "雨天也有秩序，荣只要撑住自己的伞。",
    "湿度偏高的一天，荣可以把要求放轻一点。"
  ],
  雷: [
    "荣今天的能量很强，先让情绪安全地经过身体。",
    "雷声不是坏事，它说明荣心里有东西正在释放。",
    "今天的天气很有力量，荣需要空间，也需要边界。"
  ],
  风: [
    "荣今天有风，变化在路上，手可以松一点。",
    "风会带走一些旧东西，也会把新的方向吹近荣。",
    "今天的荣适合调整姿势，等风过去，也借风前进。"
  ],
  雪: [
    "荣今天的世界安静下来，慢一点也完全可以。",
    "下雪的日子适合收声，荣不用立刻回答所有事。",
    "雪把很多声音盖住了，荣可以听见自己。"
  ]
};

const tags = ["Codex", "学习", "创作", "家", "赚钱", "松弛", "困", "想很多"];

const state = {
  weather: "晴",
  tags: new Set()
};

const $ = (selector) => document.querySelector(selector);

const form = $("#entry-form");
const note = $("#note");
const moodColor = $("#mood-color");
const energy = $("#energy");
const energyValue = $("#energy-value");
const weatherOptions = $("#weather-options");
const tagOptions = $("#tag-options");
const weekGrid = $("#week-grid");
const historyList = $("#history-list");
const saveStatus = $("#save-status");

function todayKey(date = new Date()) {
  return date.toISOString().slice(0, 10);
}

function formatDate(key) {
  return new Intl.DateTimeFormat("zh-CN", {
    month: "short",
    day: "numeric",
    weekday: "short"
  }).format(new Date(`${key}T12:00:00`));
}

function readRecords() {
  try {
    return JSON.parse(localStorage.getItem(STORAGE_KEY)) || {};
  } catch {
    return {};
  }
}

function writeRecords(records) {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(records));
}

function getWeather(name) {
  return weathers.find((weather) => weather.name === name) || weathers[0];
}

function stableIndex(seed, size) {
  let hash = 0;
  for (const char of seed) {
    hash = (hash * 31 + char.charCodeAt(0)) % 9973;
  }
  return hash % size;
}

function getShareLine(record, key = todayKey()) {
  const lines = shareLines[record.weather] || shareLines.晴;
  return lines[stableIndex(`${key}-${record.weather}`, lines.length)];
}

function createChip(label, pressed, onClick) {
  const button = document.createElement("button");
  button.type = "button";
  button.className = "chip";
  button.textContent = label;
  button.setAttribute("aria-pressed", String(pressed));
  button.addEventListener("click", onClick);
  return button;
}

function renderChoices() {
  weatherOptions.replaceChildren();
  weathers.forEach((weather) => {
    weatherOptions.append(
      createChip(weather.name, state.weather === weather.name, () => {
        state.weather = weather.name;
        renderChoices();
        updateCurrentPreview();
      })
    );
  });

  tagOptions.replaceChildren();
  tags.forEach((tag) => {
    tagOptions.append(
      createChip(tag, state.tags.has(tag), () => {
        if (state.tags.has(tag)) {
          state.tags.delete(tag);
        } else {
          state.tags.add(tag);
        }
        renderChoices();
      })
    );
  });
}

function buildShareText(record) {
  if (!record) {
    return "还没有今日记录。保存后可以复制分享文案。";
  }

  const tagText = record.tags.length ? `｜${record.tags.join("、")}` : "";
  const noteText = record.note ? `\n\n荣的短句：${record.note}` : "";
  return `天气概况：${record.weather}｜精力 ${record.energy}/10${tagText}\n\n今日分享语句：${getShareLine(record)}${noteText}`;
}

function updateCurrentPreview(record) {
  const weather = getWeather(record?.weather || state.weather);
  $("#weather-mark").textContent = weather.name;
  $("#current-title").textContent = weather.title;
  $("#current-copy").textContent = record?.note || weather.copy;
  $("#current-card").style.background =
    `linear-gradient(145deg, ${record?.color || moodColor.value}33, rgba(255, 250, 241, 0.96))`;
}

function recentKeys() {
  return Array.from({ length: 7 }, (_, index) => {
    const date = new Date();
    date.setDate(date.getDate() - (6 - index));
    return todayKey(date);
  });
}

function summarize(records) {
  const list = Object.values(records);
  $("#total-days").textContent = list.length;

  if (!list.length) {
    $("#avg-energy").textContent = "--";
    $("#common-weather").textContent = "--";
    $("#weekly-note").textContent = "荣，今天的内心天气还没有入档。";
    return;
  }

  const avg = list.reduce((sum, item) => sum + Number(item.energy), 0) / list.length;
  $("#avg-energy").textContent = avg.toFixed(1);

  const counts = list.reduce((map, item) => {
    map[item.weather] = (map[item.weather] || 0) + 1;
    return map;
  }, {});
  const common = Object.entries(counts).sort((a, b) => b[1] - a[1])[0][0];
  $("#common-weather").textContent = common;

  const recent = recentKeys().map((key) => records[key]).filter(Boolean);
  const recentAvg = recent.length
    ? recent.reduce((sum, item) => sum + Number(item.energy), 0) / recent.length
    : avg;
  const trend = recentAvg >= 7
    ? "荣这周风向不错，能量在回升。"
    : recentAvg >= 4
      ? "荣这周天气有起伏，但气压还算稳定。"
      : "荣最近云层厚一点，先减少消耗。";
  $("#weekly-note").textContent = `最近记录里最常出现的是「${common}」，${trend}`;
}

function renderWeek(records) {
  weekGrid.replaceChildren();
  recentKeys().forEach((key) => {
    const record = records[key];
    const day = document.createElement("article");
    day.className = `day ${record ? "has-record" : ""}`;
    if (record) {
      day.style.background = `linear-gradient(160deg, ${record.color}36, #fffaf1 70%)`;
    }
    day.innerHTML = `
      <small>${formatDate(key)}</small>
      <strong>${record ? `${record.weather} / ${record.energy}` : "未记录"}</strong>
      <p>${record ? record.note || "没有短句，天气也被保存了。" : "留给荣的下一次播报。"}</p>
    `;
    weekGrid.append(day);
  });
}

function renderHistory(records) {
  const entries = Object.entries(records).sort((a, b) => b[0].localeCompare(a[0]));
  historyList.replaceChildren();

  if (!entries.length) {
    const empty = document.createElement("p");
    empty.className = "empty";
    empty.textContent = "还没有档案。保存一次今日天气后，这里会出现荣的私人气象记录。";
    historyList.append(empty);
    return;
  }

  entries.forEach(([key, record]) => {
    const item = document.createElement("article");
    item.className = "record";
    item.innerHTML = `
      <time>${formatDate(key)}</time>
      <div>
        <strong>${record.weather} · 精力 ${record.energy} · ${record.tags.join("、") || "无标签"}</strong>
        <p>${record.note || "没有短句。"}</p>
      </div>
      <button class="ghost" type="button" data-delete="${key}">删除</button>
    `;
    historyList.append(item);
  });
}

function loadToday(records) {
  const record = records[todayKey()];
  state.tags = new Set(record?.tags || []);
  state.weather = record?.weather || "晴";
  note.value = record?.note || "";
  moodColor.value = record?.color || "#4f8fce";
  energy.value = record?.energy || 6;
  energyValue.textContent = energy.value;
  $("#share-text").textContent = buildShareText(record);
  renderChoices();
  updateCurrentPreview(record);
}

function render() {
  const records = readRecords();
  loadToday(records);
  summarize(records);
  renderWeek(records);
  renderHistory(records);
}

function showStatus(message) {
  saveStatus.textContent = message;
  setTimeout(() => {
    saveStatus.textContent = "";
  }, 1800);
}

energy.addEventListener("input", () => {
  energyValue.textContent = energy.value;
});

moodColor.addEventListener("input", () => updateCurrentPreview());

form.addEventListener("submit", (event) => {
  event.preventDefault();
  const records = readRecords();
  records[todayKey()] = {
    note: note.value.trim(),
    color: moodColor.value,
    energy: Number(energy.value),
    weather: state.weather,
    tags: Array.from(state.tags),
    savedAt: new Date().toISOString()
  };
  writeRecords(records);
  render();
  showStatus("已保存：荣今天的天气入档。");
});

$("#clear-today").addEventListener("click", () => {
  const records = readRecords();
  delete records[todayKey()];
  writeRecords(records);
  render();
  showStatus("已清空：荣今天的天气已移出档案。");
});

historyList.addEventListener("click", (event) => {
  const key = event.target.dataset.delete;
  if (!key) return;
  const records = readRecords();
  delete records[key];
  writeRecords(records);
  render();
});

$("#copy-share").addEventListener("click", async () => {
  await navigator.clipboard.writeText($("#share-text").textContent);
  $("#copy-share").textContent = "已复制";
  setTimeout(() => {
    $("#copy-share").textContent = "复制分享文案";
  }, 1300);
});

$("#export-data").addEventListener("click", () => {
  const data = JSON.stringify(readRecords(), null, 2);
  const blob = new Blob([data], { type: "application/json" });
  const url = URL.createObjectURL(blob);
  const link = document.createElement("a");
  link.href = url;
  link.download = `rong-weather-backup-${todayKey()}.json`;
  link.click();
  URL.revokeObjectURL(url);
});

$("#import-data").addEventListener("change", async (event) => {
  const file = event.target.files[0];
  if (!file) return;

  try {
    const records = JSON.parse(await file.text());
    if (!records || Array.isArray(records) || typeof records !== "object") {
      throw new Error("Invalid backup file");
    }
    writeRecords(records);
    render();
    showStatus("已导入：荣的天气备份已恢复。");
  } catch {
    showStatus("导入失败：请选择正确的 JSON 备份。");
  } finally {
    event.target.value = "";
  }
});

$("#today-label").textContent = formatDate(todayKey());
render();

    </script>
  </body>
</html>
